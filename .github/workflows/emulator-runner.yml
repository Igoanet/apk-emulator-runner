name: APK FUD Pipeline

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
        type: string
      apk_url:
        description: 'APK URL'
        required: true
        type: string
      telegram_chat_id:
        description: 'Chat ID'
        required: true
        type: string
      mode:
        description: 'Pipeline mode (pc or android)'
        required: true
        type: choice
        options:
          - pc
          - android
        default: 'pc'
      np_manager_email:
        description: 'NP Manager email (android mode only)'
        required: false
        type: string
      np_manager_pass:
        description: 'NP Manager password (android mode only)'
        required: false
        type: string

jobs:
  pc-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.mode == 'pc'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jre-headless wget curl unzip 2>/dev/null || true
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O /tmp/apktool.jar
          printf '#!/bin/bash\njava -jar /tmp/apktool.jar "\$@"\n' | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool
          wget -q https://dl.google.com/android/repository/build-tools_r34-linux.zip -O /tmp/build-tools.zip
          unzip -q /tmp/build-tools.zip -d /tmp/
          find /tmp/ -name "zipalign" -exec cp {} /usr/local/bin/ \; 2>/dev/null || true
          find /tmp/ -name "apksigner" -exec cp {} /usr/local/bin/ \; 2>/dev/null || true
          chmod +x /usr/local/bin/zipalign /usr/local/bin/apksigner 2>/dev/null || true
          pip install python-telegram-bot requests 2>/dev/null
      - name: Download APK
        run: |
          mkdir -p input output temp logs
          curl -sfL "${{ github.event.inputs.apk_url }}" -o input/input.apk || wget -q "${{ github.event.inputs.apk_url }}" -O input/input.apk
          ls -lh input/
      - name: Run PC pipeline
        run: |
          export FUD_WORKSPACE=$(pwd)
          python3 -c "
import asyncio, sys
sys.path.insert(0, '.')
from cli import run_pipeline
result = asyncio.run(run_pipeline('input/input.apk', verbose=True))
print(f'\n=== RESULT: {result} ===')
" | tee logs/pipeline.log
      - name: Check outputs
        if: always()
        run: |
          echo "=== Output ==="
          ls -lh output/ || echo "No output"
          ls -lh logs/
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-output-${{ github.event.inputs.job_id }}
          path: output/
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-logs-${{ github.event.inputs.job_id }}
          path: logs/

  android-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.inputs.mode == 'android'
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          pip install python-telegram-bot requests
          sudo apt-get update -qq && sudo apt-get install -y -qq android-tools-adb wget curl unzip 2>/dev/null
      - run: |
          mkdir -p ~/apk-tools ~/fud-work/input ~/fud-work/output ~/fud-work/screenshots
          curl -sf "http://13.60.208.8/input/np_manager.apk" -o ~/apk-tools/np_manager.apk || echo "NP not found"
          curl -sf "http://13.60.208.8/input/mt_manager.apk" -o ~/apk-tools/mt_manager.apk || echo "MT not found"
          curl -sf "http://13.60.208.8/input/apktool_m.apk" -o ~/apk-tools/apktool_m.apk || echo "APKTool not found"
          ls -lh ~/apk-tools/
      - uses: reactivecircus/android-emulator-runner@v2
        env:
          NP_MANAGER_EMAIL: ${{ github.event.inputs.np_manager_email }}
          NP_MANAGER_PASS: ${{ github.event.inputs.np_manager_pass }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          APK_URL: ${{ github.event.inputs.apk_url }}
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 1024M
          sdcard-path-or-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            echo "=== Emulator booted ==="
            python3 scripts/np_manager_v2.py
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-output-${{ github.event.inputs.job_id }}
          path: ~/fud-work/output/
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-screenshots-${{ github.event.inputs.job_id }}
          path: ~/fud-work/screenshots/
