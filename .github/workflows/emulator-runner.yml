name: APK Emulator Runner

  on:
    workflow_dispatch:
      inputs:
        job_id:
          description: 'Job ID from Telegram bot'
          required: true
          type: string
        apk_url:
          description: 'URL to download input APK'
          required: true
          type: string
        telegram_chat_id:
          description: 'Telegram chat ID for notifications'
          required: true
          type: string
        np_manager_email:
          description: 'NP Manager email'
          required: true
          type: string
        np_manager_pass:
          description: 'NP Manager password'
          required: true
          type: string

  jobs:
    emulator-run:
      runs-on: ubuntu-latest
      timeout-minutes: 45
      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Enable KVM
          run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            ls -la /dev/kvm

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'

        - name: Install dependencies
          run: |
            pip install python-telegram-bot requests
            sudo apt-get update -qq && sudo apt-get install -y -qq android-tools-adb wget curl unzip 2>/dev/null

        - name: Download APK Tools
          run: |
            mkdir -p ~/apk-tools ~/fud-work/input ~/fud-work/output ~/fud-work/screenshots
            # Download NP Manager from URL or use cached
            wget -q "${{ github.event.inputs.np_apk_url || 'https://placeholder' }}" -O ~/apk-tools/np_manager.apk 2>/dev/null || echo "NP Manager download skipped"
            ls -lh ~/apk-tools/

        - name: Emulator + NP Manager Automation
          uses: reactivecircus/android-emulator-runner@v2
          env:
            NP_MANAGER_EMAIL: ${{ github.event.inputs.np_manager_email }}
            NP_MANAGER_PASS: ${{ github.event.inputs.np_manager_pass }}
            TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
            APK_URL: ${{ github.event.inputs.apk_url }}
          with:
            api-level: 34
            target: google_apis
            arch: x86_64
            cores: 4
            ram-size: 8192M
            emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-save -cores 4 -memory 8192
            disable-animations: true
            script: |
              bash scripts/run_pipeline.sh

        - name: Upload Output
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: fud-output-${{ github.event.inputs.job_id }}
            path: ~/fud-work/output/

        - name: Upload Screenshots
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: fud-screenshots-${{ github.event.inputs.job_id }}
            path: ~/fud-work/screenshots/

        - name: Notify Telegram
          if: always()
          run: |
            python3 -c "
            import requests, os
            token = os.environ.get('TELEGRAM_TOKEN', '')
            if not token:
              print('No TELEGRAM_TOKEN set')
              exit(0)
            chat_id = '${{ github.event.inputs.telegram_chat_id }}'
            status = 'SUCCESS' if '${{ job.status }}' == 'success' else 'FAILED'
            msg = f'Emulator Job ${{ github.event.inputs.job_id }}: {status}'
            url = f'https://api.telegram.org/bot{token}/sendMessage'
            requests.post(url, json={'chat_id': chat_id, 'text': msg})
            "
          env:
            TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}