name: APK FUD PC Pipeline

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
        type: string
      apk_url:
        description: 'APK URL'
        required: true
        type: string
      telegram_chat_id:
        description: 'Chat ID'
        required: true
        type: string

jobs:
  fud-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jre-headless 2>/dev/null || true
          # Install apktool
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O /tmp/apktool.jar
          echo '#!/bin/bash' | sudo tee /usr/local/bin/apktool
          echo 'java -jar /tmp/apktool.jar "$@"' | sudo tee -a /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool
          # Download zipalign + apksigner from Android build tools
          wget -q https://dl.google.com/android/repository/build-tools_r34-linux.zip -O /tmp/build-tools.zip
          unzip -q /tmp/build-tools.zip -d /tmp/
          find /tmp/ -name "zipalign" -exec cp {} /usr/local/bin/ \; 2>/dev/null || true
          find /tmp/ -name "apksigner" -exec cp {} /usr/local/bin/ \; 2>/dev/null || true
          chmod +x /usr/local/bin/zipalign /usr/local/bin/apksigner 2>/dev/null || true
          pip install python-telegram-bot requests 2>/dev/null

      - name: Download input APK
        run: |
          mkdir -p input output temp logs
          curl -sfL "${{ github.event.inputs.apk_url }}" -o input/input.apk || wget -q "${{ github.event.inputs.apk_url }}" -O input/input.apk
          ls -lh input/

      - name: Run PC FUD Pipeline
        run: |
          export FUD_WORKSPACE=$(pwd)
          python3 -c "
import asyncio, sys, os
sys.path.insert(0, '.')
from cli import run_pipeline
result = asyncio.run(run_pipeline('input/input.apk', verbose=True))
print(f'\n=== RESULT: {result} ===')
" | tee logs/pipeline.log
        env:
          FUD_WORKSPACE: ${{ github.workspace }}

      - name: Check outputs
        if: always()
        run: |
          echo "=== Output Files ==="
          ls -lh output/ || echo "No output files"
          echo "=== Logs ==="
          ls -lh logs/

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-output-${{ github.event.inputs.job_id }}
          path: output/

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-logs-${{ github.event.inputs.job_id }}
          path: |
            logs/
