name: APK FUD Pipeline v3
# Triggered via repository_dispatch from the bot (no public server needed).
# Downloads APKs from private GitHub release assets using gh CLI (GITHUB_TOKEN).
# Uploads output as a GitHub Actions artifact — bot polls and downloads directly.

on:
  repository_dispatch:
    types: [run-fud-pipeline]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Pipeline run ID (tag name of the draft release)"
        required: true
      apk_asset_id:
        description: "Release asset ID for input APK"
        required: true
      np_asset_id:
        description: "Release asset ID for NP Manager APK (optional)"
        required: false
        default: ""
      mt_asset_id:
        description: "Release asset ID for MT Manager APK (optional)"
        required: false
        default: ""
      apktoolm_asset_id:
        description: "Release asset ID for APKTool M APK (optional)"
        required: false
        default: ""

jobs:
  fud-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # Explicitly grant GITHUB_TOKEN permission to read repo content (release assets)
    permissions:
      contents: write
      actions: write

    steps:
      # ── Checkout repo to get automation scripts ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Install Python dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -q pillow requests

      # ── Resolve inputs from dispatch event ───────────────────────────────
      - name: Resolve inputs
        id: inputs
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            NP_PASS="${{ github.event.client_payload.np_manager_pass }}"
            echo "::add-mask::${NP_PASS}"

            echo "RUN_ID=${{ github.event.client_payload.run_id }}"                        >> "$GITHUB_ENV"
            echo "REPO=Igoanet/apk-emulator-runner"                                        >> "$GITHUB_ENV"
            echo "APK_ASSET_ID=${{ github.event.client_payload.apk_asset_id }}"           >> "$GITHUB_ENV"
            echo "NP_ASSET_ID=${{ github.event.client_payload.np_asset_id }}"             >> "$GITHUB_ENV"
            echo "MT_ASSET_ID=${{ github.event.client_payload.mt_asset_id }}"             >> "$GITHUB_ENV"
            echo "APKTOOLM_ASSET_ID=${{ github.event.client_payload.apktoolm_asset_id }}" >> "$GITHUB_ENV"
            echo "NP_MANAGER_EMAIL=${{ github.event.client_payload.np_manager_email }}"   >> "$GITHUB_ENV"
            echo "NP_MANAGER_PASS=${NP_PASS}"                                               >> "$GITHUB_ENV"
          else
            echo "RUN_ID=${{ github.event.inputs.run_id }}"                                >> "$GITHUB_ENV"
            echo "REPO=Igoanet/apk-emulator-runner"                                        >> "$GITHUB_ENV"
            echo "APK_ASSET_ID=${{ github.event.inputs.apk_asset_id }}"                   >> "$GITHUB_ENV"
            echo "NP_ASSET_ID=${{ github.event.inputs.np_asset_id }}"                     >> "$GITHUB_ENV"
            echo "MT_ASSET_ID=${{ github.event.inputs.mt_asset_id }}"                     >> "$GITHUB_ENV"
            echo "APKTOOLM_ASSET_ID=${{ github.event.inputs.apktoolm_asset_id }}"         >> "$GITHUB_ENV"
          fi

      # ── Enable KVM for hardware acceleration ──────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Copy automation scripts to home dir ───────────────────────────────
      - name: Set up automation scripts
        run: |
          mkdir -p ~/github_automation
          cp github_automation/np_manager_v3.py   ~/github_automation/ 2>/dev/null || echo "np_manager_v3.py not found, skipping"
          cp github_automation/mt_manager_auto.py ~/github_automation/ 2>/dev/null || echo "mt_manager_auto.py not found, skipping"
          cp github_automation/apktool_m_auto.py  ~/github_automation/ 2>/dev/null || echo "apktool_m_auto.py not found, skipping"
          chmod +x github_automation/run_pipeline_v3.sh

      # ── Start Android emulator and run full pipeline ──────────────────────
      - name: Run Android hardening pipeline
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # gh CLI uses GITHUB_TOKEN automatically on Actions runners
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 512M
          disk-size: 8192M
          force-avd-creation: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot-save
          disable-animations: true
          script: bash github_automation/run_pipeline_v3.sh

      # ── Upload output APK as artifact (bot downloads this) ────────────────
      - name: Upload output APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-pipeline-output-${{ env.RUN_ID }}
          path: |
            ~/fud-work/output/android_hardened.apk
          retention-days: 1
          if-no-files-found: warn

      # ── Upload logs for debugging ─────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fud-pipeline-logs-${{ env.RUN_ID }}
          path: |
            ~/fud-work/logs/
            ~/fud-work/output/screenshots/
          retention-days: 1
          if-no-files-found: warn
